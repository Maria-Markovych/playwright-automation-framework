name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-tests:
    name: UI Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://automationexercise.com/
      API_URL: https://automationexercise.com/api
      NODE_ENV: dev
      HEADLESS: true
      WORKERS: 1

      USER_NAME: ${{ secrets.USER_NAME }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run uitests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results
          retention-days: 14  


  api-tests:
    name: API Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://automationexercise.com/
      API_URL: https://automationexercise.com/api
      NODE_ENV: dev
      HEADLESS: true
      WORKERS: 1

      USER_NAME: ${{ secrets.USER_NAME }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run apitests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
          retention-days: 14  


  network-tests:
    name: Network Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://automationexercise.com/
      API_URL: https://automationexercise.com/api
      NODE_ENV: dev
      HEADLESS: true
      WORKERS: 1

      USER_NAME: ${{ secrets.USER_NAME }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Network tests
        run: npm run networktests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-network
          path: allure-results
          retention-days: 14  

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest

    needs:
      - ui-tests
      - api-tests
      - network-tests

    if: always()

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api

      - name: Download Network Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-network
          path: allure-results-network

      - name: Generate Allure report
        run: |
          npx allure generate \
            allure-results-ui \
            allure-results-api \
            allure-results-network \
            -o allure-report \
            --clean

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Allure report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4          